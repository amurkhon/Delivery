services:
  api:
    build: .
    container_name: delivery-api
    restart: always
    image: python:3.12-slim
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@Amir(Khan)2002@72.61.116.31:5432/delivery
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-in-production}
      - ENVIRONMENT=production
      - CORS_ORIGINS=${CORS_ORIGINS:-http://72.61.116.31:3000,http://72.61.116.31:5173,http://72.61.116.31:6000}
      - UPLOAD_DIR=/app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: delivery_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  uploads_data:
